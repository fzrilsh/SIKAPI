services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sikapi-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
      - "5173:5173"
    depends_on:
      - db
    command: >
      bash -c "composer install 
      && npm install 
      && php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: mysql:8.0
    container_name: sikapi-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sikapi}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-sikapi_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - sikapi-mysql-data:/var/lib/mysql

volumes:
  sikapi-mysql-data: